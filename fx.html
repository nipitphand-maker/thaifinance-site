<body>

<div class="page-hd">
  <div class="eyebrow"><span class="live-dot"></span> <span id="updatedAt">กำลังโหลด...</span></div>

<div class="sec">

    <div class="field">

    </div>

    </div>

<script>
const CURRENCIES = [
  ['THB', '🇹🇭 บาท (THB)'],
  ['USD', '🇺🇸 ดอลลาร์สหรัฐ (USD)'],
  ['EUR', '🇪🇺 ยูโร (EUR)'],
  ['JPY', '🇯🇵 เยน (JPY)'],
  ['KRW', '🇰🇷 วอน (KRW)'],
  ['CNY', '🇨🇳 หยวน (CNY)'],
  ['GBP', '🇬🇧 ปอนด์ (GBP)'],
  ['AUD', '🇦🇺 ดอลลาร์ออสเตรเลีย (AUD)'],
  ['SGD', '🇸🇬 ดอลลาร์สิงคโปร์ (SGD)'],
  ['HKD', '🇭🇰 ดอลลาร์ฮ่องกง (HKD)'],
  ['TWD', '🇹🇼 ดอลลาร์ไต้หวัน (TWD)'],
  ['MYR', '🇲🇾 ริงกิต (MYR)'],
  ['VND', '🇻🇳 ดอง (VND)'],
  ['IDR', '🇮🇩 รูเปียห์ (IDR)'],
  ['PHP', '🇵🇭 เปโซ (PHP)'],
  ['INR', '🇮🇳 รูปี (INR)'],
];

let rates = null;

function populateSelects() {
  const fromSel = document.getElementById('from');
  const toSel = document.getElementById('to');
  CURRENCIES.forEach(([code, label]) => {
    fromSel.insertAdjacentHTML('beforeend', `<option value="${code}">${label}</option>`);
    toSel.insertAdjacentHTML('beforeend', `<option value="${code}">${label}</option>`);
  });
  fromSel.value = 'USD';
  toSel.value = 'THB';
  fromSel.addEventListener('change', render);
  toSel.addEventListener('change', render);
  document.getElementById('amount').addEventListener('input', render);
}

async function fetchRates() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    if (j.result === 'success') {
      rates = j.rates;
      const d = new Date(j.time_last_update_utc);
      document.getElementById('updatedAt').textContent =
        `อัปเดต ${d.toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' })}`;
      render();
      renderPopular();
    } else throw new Error('api fail');
  } catch (e) {
    document.getElementById('updatedAt').textContent = 'เชื่อมต่อไม่ได้ — กำลังใช้ค่าตัวอย่าง';
    rates = { USD: 1, THB: 34.5, EUR: 0.92, JPY: 156, KRW: 1380, CNY: 7.25, GBP: 0.79, AUD: 1.53, SGD: 1.34, HKD: 7.83, TWD: 32.4, MYR: 4.75, VND: 25400, IDR: 16200, PHP: 58.5, INR: 84 };
    render();
    renderPopular();
  }
}

function convert(amount, from, to) {
  if (!rates) return 0;
  const usdAmount = from === 'USD' ? amount : amount / rates[from];
  return to === 'USD' ? usdAmount : usdAmount * rates[to];
}

function render() {
  const amt = parseFloat(document.getElementById('amount').value) || 0;
  const from = document.getElementById('from').value;
  const to = document.getElementById('to').value;
  const out = convert(amt, from, to);
  const dec = out > 100 ? 2 : out > 1 ? 4 : 6;
  document.getElementById('fxOut').textContent = fmt(out, dec) + ' ' + to;
  const oneFromInTo = convert(1, from, to);
  document.getElementById('fxRate').textContent =
    `1 ${from} = ${fmt(oneFromInTo, oneFromInTo > 100 ? 2 : 4)} ${to}`;
}

function swap() {
  const fromSel = document.getElementById('from');
  const toSel = document.getElementById('to');
  const tmp = fromSel.value;
  fromSel.value = toSel.value;
  toSel.value = tmp;
  render();
}

function renderPopular() {
  const list = document.getElementById('popularList');
  const pops = ['USD', 'EUR', 'JPY', 'KRW', 'CNY', 'GBP', 'SGD', 'AUD'];
  list.innerHTML = pops.map((c, i) => {
    const oneToTHB = convert(1, c, 'THB');
    const name = CURRENCIES.find(x => x[0] === c)[1];
    return `<div class="c-row" style="animation-delay:${i * 0.04}s">
      <div><div class="c-label">${name}</div><div class="c-sub">1 ${c}</div></div>
      <div style="text-align:right"><div class="c-price">${fmt(oneToTHB, 2)}</div><div class="c-unit">บาท</div></div>
    </div>`;
  }).join('');
}

populateSelects();
fetchRates();
setInterval(fetchRates, 5 * 60 * 1000);
</script>

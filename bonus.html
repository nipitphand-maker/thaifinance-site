<body>

  <div class="eyebrow">Bonus Tax</div>

<div class="sec">
  <div class="form-card">
    <div class="field">
      <label class="f-label">เงินเดือน (บาท/เดือน)</label>
      <input type="number" class="f-input" id="salary" value="40000">
    </div>
    <div class="field">
      <label class="f-label">โบนัส (บาท)</label>
      <input type="number" class="f-input" id="bonus" value="120000">
    </div>
    <div class="field">
      <label class="f-label">ลดหย่อนภาษีรวม (บาท)</label>
      <input type="number" class="f-input" id="deduct" value="0">
      <div class="f-hint">RMF, SSF, ประกัน, บุตร, คู่สมรส รวมกัน · ใส่ 0 ถ้ายังไม่ได้ลงทุน</div>
    </div>
    <button class="btn btn-dark" onclick="calcBonus()">คำนวณ</button>
    <div class="result" id="bnResult">
      <div class="r-label">ภาษีจากโบนัสเฉพาะ</div>
      <div class="r-val down" id="bnTax">—</div>
      <div class="r-detail" id="bnDetail">—</div>
    </div>
  </div>
</div>

<div class="sec" style="padding-top:0">
  <div class="stat-grid" id="bnStats" style="display:none"></div>

<footer>คำนวณตามอัตราภาษี 2568 · โบนัสรวมกับเงินเดือนเข้าฐานเดียวกัน<br>หักประกันสังคม 9,000 + ลดหย่อนส่วนตัว 60,000 ให้อัตโนมัติ</footer>

<script>
const BRACKETS = [
  { l: 150000, r: 0 }, { l: 150000, r: 0.05 }, { l: 200000, r: 0.10 },
  { l: 250000, r: 0.15 }, { l: 250000, r: 0.20 }, { l: 1000000, r: 0.25 },
  { l: 3000000, r: 0.30 }, { l: Infinity, r: 0.35 }
];

function calcTax(taxable) {
  let tax = 0, rem = taxable;
  for (const b of BRACKETS) {
    if (rem <= 0) break;
    tax += Math.min(rem, b.l) * b.r;
    rem -= b.l;
  }
  return Math.max(0, tax);
}

function calcBonus() {
  const salary = parseFloat(document.getElementById('salary').value) || 0;
  const bonus = parseFloat(document.getElementById('bonus').value) || 0;
  const extraDeduct = parseFloat(document.getElementById('deduct').value) || 0;
  if (!salary && !bonus) { alert('กรุณาใส่เงินเดือนหรือโบนัส'); return; }

  // รายได้รวม
  const yearSalary = salary * 12;
  const grossWithoutBonus = yearSalary;
  const grossWithBonus = yearSalary + bonus;

  // หักค่าใช้จ่ายส่วนตัว 50% สูงสุด 100,000
  const expWithout = Math.min(grossWithoutBonus * 0.5, 100000);
  const expWith = Math.min(grossWithBonus * 0.5, 100000);
  // ลดหย่อนพื้นฐาน
  const baseDeduct = 60000 + 9000 + extraDeduct;

  const taxableWithout = Math.max(0, grossWithoutBonus - expWithout - baseDeduct);
  const taxableWith = Math.max(0, grossWithBonus - expWith - baseDeduct);

  const taxWithout = calcTax(taxableWithout);
  const taxWith = calcTax(taxableWith);
  const bonusTax = taxWith - taxWithout;
  const netBonus = bonus - bonusTax;
  const effectiveBonusRate = bonus > 0 ? bonusTax / bonus * 100 : 0;
  const effectiveYearRate = grossWithBonus > 0 ? taxWith / grossWithBonus * 100 : 0;

  document.getElementById('bnTax').textContent = fmt(bonusTax, 0) + ' บาท';
  document.getElementById('bnDetail').textContent =
    `ภาษีจากโบนัสเฉพาะ · effective rate ${effectiveBonusRate.toFixed(1)}%`;
  document.getElementById('bnResult').classList.add('show');

  const s = document.getElementById('bnStats');
  s.style.display = 'grid';
  s.innerHTML = `
    <div class="stat"><div class="stat-val up">${fmt(netBonus, 0)}</div><div class="stat-label">ได้รับจริง</div></div>
    <div class="stat"><div class="stat-val down">${fmt(bonusTax, 0)}</div><div class="stat-label">ภาษีโบนัส</div></div>
    <div class="stat"><div class="stat-val">${effectiveBonusRate.toFixed(1)}%</div><div class="stat-label">% หักจากโบนัส</div></div>
    <div class="stat"><div class="stat-val">${effectiveYearRate.toFixed(1)}%</div><div class="stat-label">Effective rate ทั้งปี</div></div>`;

  const cmp = document.getElementById('bnCompare');
  cmp.style.display = 'block';
  cmp.innerHTML = `
    <div class="c-row"><div><div class="c-label">ไม่มีโบนัส</div><div class="c-sub">รายได้ทั้งปี ${fmt(grossWithoutBonus, 0)}</div></div><div class="c-price">${fmt(taxWithout, 0)}</div></div>
    <div class="c-row"><div><div class="c-label">มีโบนัส ${fmt(bonus, 0)}</div><div class="c-sub">รายได้ทั้งปี ${fmt(grossWithBonus, 0)}</div></div><div class="c-price">${fmt(taxWith, 0)}</div></div>
    <div class="c-row"><div><div class="c-label" style="color:var(--down)">ส่วนต่าง = ภาษีจากโบนัส</div></div><div class="c-price" style="color:var(--down)">+${fmt(bonusTax, 0)}</div></div>
    <div class="c-row"><div><div class="c-label" style="color:var(--up)">โบนัสที่ได้รับจริง</div><div class="c-sub">หลังหักภาษี</div></div><div class="c-price" style="color:var(--up)">${fmt(netBonus, 0)}</div></div>
    <div class="c-row"><div><div class="c-label">💡 ทิป: ซื้อ SSF/RMF</div><div class="c-sub">ลดหย่อน 30% ของรายได้ ลดภาษีโบนัสได้</div></div></div>`;
}
window.addEventListener('load', calcBonus);
</script>

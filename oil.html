<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ราคาน้ำมันวันนี้ — ThaiFinance</title>
<meta name="description" content="ราคาน้ำมันวันนี้ทุกประเภท เบนซิน ดีเซล E20 E85 จากทุกปั๊ม PTT Shell Esso Caltex Bangchak">
<link rel="stylesheet" href="css/style.css">
<meta name="google-site-verification" content="YPFBI_qSMc8OWCAuNyRFKw-xe0C4d0xpLsZKSqlNb-s">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7049269744581719" crossorigin="anonymous"></script>
</head>
<body>
<script src="js/utils.js"></script>
<script>injectNav('oil.html')</script>

<div class="page-hd">
  <div class="eyebrow"><span class="live-dot"></span> <span id="updatedAt">กำลังโหลด...</span></div>
  <div class="page-title num" id="heroPrice">—</div>
  <div class="page-sub">บาท/ลิตร · ดีเซล</div>
  <div class="change-pill flat" id="heroBadge">—</div>
</div>

<div class="sec" style="padding-top:0">
  <div id="effectiveBanner"></div>
  <div class="card" id="oilCard"></div>
</div>

<div class="sec" style="padding-top:0">
  <div id="premiumBanner"></div>
  <div class="card" id="oilPremiumCard"></div>
</div>

<div class="sec" style="padding-top:0">
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-lbl">ดีเซล B7 ย้อนหลัง</div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab(this,()=>drawOil('7d'))">7 วัน</button>
        <button class="tab" onclick="switchTab(this,()=>drawOil('30d'))">30 วัน</button>
      </div>
    </div>
    <canvas id="oilChart"></canvas>
  </div>
</div>

<div class="sec" style="padding-top:0;padding-bottom:8px">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-7049269744581719"
       data-ad-slot="5181542042"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
<footer>ข้อมูล: บางจาก (กทม.) · อัปเดตทุกสัปดาห์<br>ราคาขายปลีกอาจแตกต่างตามพื้นที่ ยี่ห้อ และโปรโมชั่น</footer>

<script>
const WORKER = 'https://oil-price.nipitphand.workers.dev';
const ORDER_MAIN    = ['B7','95','91','E20','E85','B20'];
const ORDER_PREMIUM = ['พรีเมียม','98'];
const MOCK = {
  '95':{name:'แก๊สโซฮอล์ 95', group:'main', effective:44.90, previous:44.90, nextDay:44.90, diff:0, nextDiff:0},
  '91':{name:'แก๊สโซฮอล์ 91', group:'main', effective:44.53, previous:44.53, nextDay:44.53, diff:0, nextDiff:0},
  'E20':{name:'แก๊สโซฮอล์ E20', group:'main', effective:37.90, previous:37.90, nextDay:37.90, diff:0, nextDiff:0},
  'E85':{name:'แก๊สโซฮอล์ E85', group:'main', effective:33.84, previous:33.84, nextDay:33.84, diff:0, nextDiff:0},
  'B7':{name:'ดีเซล', group:'main', effective:42.20, previous:42.20, nextDay:42.20, diff:0, nextDiff:0},
  'B20':{name:'ดีเซล B20', group:'main', effective:35.20, previous:35.20, nextDay:35.20, diff:0, nextDiff:0},
};

let heroSeries = null;

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text != null) e.textContent = text;
  return e;
}

function renderRows(cardId, order, prices) {
  const card = document.getElementById(cardId);
  if (!card) return;
  card.replaceChildren();
  const entries = order.map(k => [k, prices[k]]).filter(([, o]) => o);
  if (!entries.length) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  entries.forEach(([k, o], i) => {
    const cls = o.diff > 0 ? 'up' : o.diff < 0 ? 'down' : 'flat';
    const sign = o.diff > 0 ? '▲' : o.diff < 0 ? '▼' : '–';

    const row = el('div', 'c-row');
    row.style.animationDelay = `${i * 0.05}s`;

    const left = el('div');
    left.appendChild(el('div', 'c-label', o.name));
    if (Math.abs(o.diff) > 0.001) {
      const sub = el('div', 'c-sub', `เดิม ${fmt(o.previous, 2)} บาท`);
      left.appendChild(sub);
    }
    row.appendChild(left);

    const right = document.createElement('div');
    right.style.textAlign = 'right';
    right.appendChild(el('div', 'c-price', fmt(o.effective, 2)));

    const unit = el('div', 'c-unit');
    unit.append('บาท/ลิตร ');
    const badge = el('span', `badge ${cls}`, `${sign}${fmt(Math.abs(o.diff), 2)}`);
    unit.appendChild(badge);
    right.appendChild(unit);

    if (Math.abs(o.nextDiff) > 0.001) {
      const tcls = o.nextDiff > 0 ? 'up' : 'down';
      const tsign = o.nextDiff > 0 ? '▲' : '▼';
      const tmrw = el('div', 'c-tomorrow');
      tmrw.style.cssText = 'font-size:11px;color:var(--ink3);margin-top:2px';
      tmrw.append('วันถัดไป ' + fmt(o.nextDay, 2) + ' ');
      const tbadge = el('span', `badge ${tcls}`, `${tsign}${fmt(Math.abs(o.nextDiff), 2)}`);
      tmrw.appendChild(tbadge);
      right.appendChild(tmrw);
    }

    row.appendChild(right);
    card.appendChild(row);
  });
}

function renderEffectiveBanner(prices, effectiveText) {
  const target = document.getElementById('effectiveBanner');
  if (!target) return;
  target.replaceChildren();
  target.removeAttribute('style');

  const allMain = ORDER_MAIN.map(k => prices[k]).filter(Boolean);
  const rises = allMain.filter(o => o.diff > 0.001);
  const drops = allMain.filter(o => o.diff < -0.001);

  if (!effectiveText && !rises.length && !drops.length) return;

  if (effectiveText) {
    const head = el('div', null, '⏰ ' + effectiveText);
    head.style.cssText = 'font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:6px';
    target.appendChild(head);
  }

  if (rises.length) {
    const line = el('div');
    line.style.cssText = 'font-size:13px;color:var(--ink1);line-height:1.6';
    line.append('ขึ้น: ');
    rises.forEach((o, i) => {
      if (i > 0) line.append(', ');
      line.append(o.name + ' ');
      line.appendChild(el('span', 'badge up', `▲${fmt(Math.abs(o.diff), 2)}`));
    });
    target.appendChild(line);
  }
  if (drops.length) {
    const line = el('div');
    line.style.cssText = 'font-size:13px;color:var(--ink1);line-height:1.6';
    line.append('ลด: ');
    drops.forEach((o, i) => {
      if (i > 0) line.append(', ');
      line.append(o.name + ' ');
      line.appendChild(el('span', 'badge down', `▼${fmt(Math.abs(o.diff), 2)}`));
    });
    target.appendChild(line);
  }
  target.style.cssText = 'background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:12px';
}

function renderPremiumBanner(prices) {
  const target = document.getElementById('premiumBanner');
  if (!target) return;
  target.replaceChildren();
  target.removeAttribute('style');
  const has = ORDER_PREMIUM.some(k => prices[k]);
  if (!has) return;
  const head = el('div', null, 'ราคาเฉพาะปั๊ม Bangchak');
  head.style.cssText = 'font-size:12px;color:var(--ink3);margin-bottom:6px;padding-left:4px';
  target.appendChild(head);
}

function updateHero(prices) {
  const hero = prices['B7'] || prices['95'] || Object.values(prices)[0];
  if (!hero) return;
  document.getElementById('heroPrice').textContent = fmt(hero.effective, 2);
  const cls = hero.diff > 0 ? 'up' : hero.diff < 0 ? 'down' : 'flat';
  const sign = hero.diff > 0 ? '▲' : hero.diff < 0 ? '▼' : '–';
  const badge = document.getElementById('heroBadge');
  badge.className = `change-pill ${cls}`;
  badge.textContent = Math.abs(hero.diff) > 0.001
    ? `${sign} ${fmt(Math.abs(hero.diff), 2)} จากราคาเดิม`
    : 'ราคาคงที่';
  heroSeries = [hero.previous, hero.effective];
}

async function fetchOil() {
  let prices = MOCK;
  let effectiveText = '';
  try {
    const r = await fetch(WORKER);
    const j = await r.json();
    if (j.success && j.prices && Object.keys(j.prices).length) {
      prices = j.prices;
      effectiveText = j.effective || '';
      document.getElementById('updatedAt').textContent =
        `ประกาศ ${j.announcedAt || ''} · ${j.source}`;
    } else {
      document.getElementById('updatedAt').textContent =
        'แหล่งข้อมูลตอบไม่ได้ — แสดงค่าตัวอย่าง';
    }
  } catch (e) {
    document.getElementById('updatedAt').textContent =
      'เชื่อมต่อไม่ได้ — แสดงค่าตัวอย่าง';
  }
  updateHero(prices);
  renderEffectiveBanner(prices, effectiveText);
  renderRows('oilCard', ORDER_MAIN, prices);
  renderPremiumBanner(prices);
  renderRows('oilPremiumCard', ORDER_PREMIUM, prices);
  drawOil('7d');
}

function drawOil(r) {
  let vals, labs;
  if (heroSeries && heroSeries.length >= 2) {
    vals = r === '7d'
      ? [heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[1], heroSeries[1]]
      : Array.from({ length: 30 }, (_, i) => (i < 28 ? heroSeries[0] : heroSeries[1]));
    labs = r === '7d'
      ? ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.']
      : Array.from({ length: 30 }, (_, i) => String(i + 1));
  } else {
    vals = r === '7d'
      ? [36.44, 36.44, 36.44, 35.94, 35.94, 35.94, 35.94]
      : Array.from({ length: 30 }, (_, i) => 36.44 - (i > 20 ? 0.5 : 0));
    labs = r === '7d'
      ? ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.']
      : Array.from({ length: 30 }, (_, i) => String(i + 1));
  }
  drawLineChart('oilChart', vals, labs, '#2D3FE0');
}

window.addEventListener('load', () => {
  fetchOil();
  setInterval(fetchOil, 30 * 60 * 1000);
});
window.addEventListener('resize', () => drawOil('7d'));
</script>
</body>
</html>

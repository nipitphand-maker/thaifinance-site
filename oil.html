<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ราคาน้ำมันวันนี้ — ThaiFinance</title>
<meta name="description" content="ราคาน้ำมันวันนี้ทุกประเภท เบนซิน ดีเซล E20 E85 จากทุกปั๊ม PTT Shell Esso Caltex Bangchak">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/utils.js"></script>
<script>injectNav('oil.html')</script>

<div class="page-hd">
  <div class="eyebrow"><span class="live-dot"></span> อัปเดตทุกสัปดาห์</div>
  <div class="page-title">35.94</div>
  <div class="page-sub">บาท/ลิตร · ดีเซล B7</div>
  <div class="change-pill down">▼ −0.50 จากสัปดาห์ก่อน</div>
</div>

<div class="sec">
  <div class="filter-row" id="pumpFilter">
    <button class="filter-btn active" onclick="setPump(this,'ptt')">PTT</button>
    <button class="filter-btn" onclick="setPump(this,'shell')">Shell</button>
    <button class="filter-btn" onclick="setPump(this,'esso')">Esso</button>
    <button class="filter-btn" onclick="setPump(this,'caltex')">Caltex</button>
    <button class="filter-btn" onclick="setPump(this,'bangchak')">Bangchak</button>
  </div>
</div>

<div class="sec" style="padding-top:0">
  <div class="card" id="oilCard"></div>
</div>

<div class="sec" style="padding-top:0">
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-lbl">ดีเซล B7 ย้อนหลัง</div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab(this,()=>drawOil('7d'))">7 วัน</button>
        <button class="tab" onclick="switchTab(this,()=>drawOil('30d'))">30 วัน</button>
      </div>
    </div>
    <canvas id="oilChart"></canvas>
  </div>
</div>

<footer>ข้อมูลอ้างอิงจากกรมธุรกิจพลังงาน · อัปเดตทุกสัปดาห์<br>ราคาอาจแตกต่างตามพื้นที่</footer>

<script>
const OILS = {
  '95':{icon:'●',name:'เบนซิน 95',price:42.45,prev:42.95},
  'E20':{icon:'●',name:'แก๊สโซฮอล์ E20',price:35.24,prev:35.74},
  'E85':{icon:'●',name:'แก๊สโซฮอล์ E85',price:24.19,prev:24.69},
  'B7':{icon:'●',name:'ดีเซล B7',price:35.94,prev:36.44},
  'B20':{icon:'●',name:'ดีเซล B20',price:34.44,prev:34.94},
  'พรีเมียม':{icon:'●',name:'ดีเซลพรีเมียม',price:38.64,prev:39.14},
};

function renderOil() {
  const card = document.getElementById('oilCard');
  card.innerHTML = Object.entries(OILS).map(([k,o],i)=>{
    const diff = o.price - o.prev;
    const cls = diff>0?'up':diff<0?'down':'flat';
    const sign = diff>0?'▲':diff<0?'▼':'–';
    return `<div class="c-row" style="animation-delay:${i*0.05}s">
      <div><div class="c-label">${o.name}</div></div>
      <div style="text-align:right">
        <div class="c-price">${fmt(o.price,2)}</div>
        <div class="c-unit">บาท/ลิตร &nbsp;<span class="badge ${cls}">${sign}${fmt(Math.abs(diff),2)}</span></div>
      </div>
    </div>`;
  }).join('');
}

function setPump(btn,pump) {
  btn.closest('.filter-row').querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderOil(); // same prices for now
}

const d7=[36.44,36.44,36.44,35.94,35.94,35.94,35.94];
const d30=Array.from({length:30},(_,i)=>36.44-(i>20?0.5:0));
function drawOil(r){
  const v=r==='7d'?d7:d30;
  const l=r==='7d'?['จ.','อ.','พ.','พฤ.','ศ.','ส.','อา.']:Array.from({length:30},(_,i)=>String(i+1));
  drawLineChart('oilChart',v,l,'#2D3FE0');
}

window.addEventListener('load',()=>{renderOil();drawOil('7d');});
window.addEventListener('resize',()=>drawOil('7d'));
</script>
</body>
</html>

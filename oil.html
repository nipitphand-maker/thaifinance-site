<body>
<script src="js/utils.js"></script>
<script>injectNav('oil.html')</script>

<div class="page-hd">
  <div class="eyebrow"><span class="live-dot"></span> <span id="updatedAt">กำลังโหลด...</span></div>
  <div class="page-title num" id="heroPrice">—</div>

<div class="sec" style="padding-top:0">

  <div class="card" id="oilPremiumCard"></div>
</div>

<div class="sec" style="padding-top:0">
  <div class="chart-card">
    <div class="chart-head">
      <div class="chart-lbl">ดีเซล B7 ย้อนหลัง</div>
      <div class="tab-row">
        <button class="tab active" onclick="switchTab(this,()=>drawOil('7d'))">7 วัน</button>
        <button class="tab" onclick="switchTab(this,()=>drawOil('30d'))">30 วัน</button>
      </div>
    </div>

  </div>

<footer>ข้อมูล: บางจาก (กทม.) · อัปเดตทุกสัปดาห์<br>ราคาขายปลีกอาจแตกต่างตามพื้นที่ ยี่ห้อ และโปรโมชั่น</footer>

<script>
const WORKER = 'https://oil-price.nipitphand.workers.dev';
const ORDER_MAIN    = ['B7','95','91','E20','E85','B20'];
const ORDER_PREMIUM = ['พรีเมียม','98'];
const MOCK = {
  '95':{name:'แก๊สโซฮอล์ 95', group:'main', price:44.90, nextDay:44.90, nextDiff:0},
  '91':{name:'แก๊สโซฮอล์ 91', group:'main', price:44.53, nextDay:44.53, nextDiff:0},
  'E20':{name:'แก๊สโซฮอล์ E20', group:'main', price:37.90, nextDay:37.90, nextDiff:0},
  'E85':{name:'แก๊สโซฮอล์ E85', group:'main', price:33.84, nextDay:33.84, nextDiff:0},
  'B7':{name:'ดีเซล', group:'main', price:42.20, nextDay:42.20, nextDiff:0},
  'B20':{name:'ดีเซล B20', group:'main', price:35.20, nextDay:35.20, nextDiff:0},
};

let heroSeries = null;

function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text != null) e.textContent = text;
  return e;
}

function renderRows(cardId, order, prices) {
  const card = document.getElementById(cardId);
  if (!card) return;
  card.replaceChildren();
  const entries = order.map(k => [k, prices[k]]).filter(([, o]) => o);
  if (!entries.length) {
    card.style.display = 'none';
    return;
  }
  card.style.display = '';
  entries.forEach(([k, o], i) => {
    const row = el('div', 'c-row');
    row.style.animationDelay = `${i * 0.05}s`;

    const left = el('div');
    left.appendChild(el('div', 'c-label', o.name));
    row.appendChild(left);

    const right = document.createElement('div');
    right.style.textAlign = 'right';
    right.appendChild(el('div', 'c-price', fmt(o.price, 2)));

    const unit = el('div', 'c-unit', 'บาท/ลิตร');
    right.appendChild(unit);

    if (Math.abs(o.nextDiff) > 0.001) {
      const tcls = o.nextDiff > 0 ? 'up' : 'down';
      const tsign = o.nextDiff > 0 ? '▲' : '▼';
      const tmrw = el('div', 'c-tomorrow');
      tmrw.style.cssText = 'font-size:13px;color:var(--ink2);margin-top:3px;font-weight:500';
      tmrw.append('วันถัดไป ' + fmt(o.nextDay, 2) + ' ');
      const tbadge = el('span', `badge ${tcls}`, `${tsign}${fmt(Math.abs(o.nextDiff), 2)}`);
      tmrw.appendChild(tbadge);
      right.appendChild(tmrw);
    }

    row.appendChild(right);
    card.appendChild(row);
  });
}

function renderEffectiveBanner(effectiveText) {
  const target = document.getElementById('effectiveBanner');
  if (!target) return;
  target.replaceChildren();
  target.removeAttribute('style');
  if (!effectiveText) return;
  const head = el('div', null, '⏰ ' + effectiveText);
  head.style.cssText = 'font-size:13px;font-weight:600;color:var(--ink2)';
  target.appendChild(head);
  target.style.cssText = 'background:var(--bg2);border-radius:10px;padding:10px 12px;margin-bottom:12px';
}

function renderPremiumBanner(prices) {
  const target = document.getElementById('premiumBanner');
  if (!target) return;
  target.replaceChildren();
  target.removeAttribute('style');
  const has = ORDER_PREMIUM.some(k => prices[k]);
  if (!has) return;
  const head = el('div', null, 'ราคาเฉพาะปั๊ม Bangchak');
  head.style.cssText = 'font-size:12px;color:var(--ink3);margin-bottom:6px;padding-left:4px';
  target.appendChild(head);
}

function updateHero(prices) {
  const hero = prices['B7'] || prices['95'] || Object.values(prices)[0];
  if (!hero) return;
  document.getElementById('heroPrice').textContent = fmt(hero.price, 2);
  heroSeries = [hero.price, hero.price];
}

// รับทั้ง schema เก่า (today/yesterday/tomorrow) และใหม่ (price/nextDay/nextDiff)
function normalize(prices) {
  const out = {};
  for (const [k, o] of Object.entries(prices)) {
    const price = o.price ?? o.effective ?? o.today;
    const nextDay = o.nextDay ?? o.tomorrow ?? price;
    const nextDiff = o.nextDiff != null
      ? o.nextDiff
      : (typeof nextDay === 'number' && typeof price === 'number'
          ? +(nextDay - price).toFixed(2)
          : 0);
    out[k] = { name: o.name, group: o.group, price, nextDay, nextDiff };
  }
  return out;
}

async function fetchOil() {
  let prices = MOCK;
  let effectiveText = '';
  let announcedAt = '';
  let source = '';
  try {
    const r = await fetch(WORKER);
    const j = await r.json();
    if (j.success && j.prices && Object.keys(j.prices).length) {
      prices = normalize(j.prices);
      effectiveText = j.effective || '';
      announcedAt = j.announcedAt || j.updatedAtThai || '';
      source = j.source || '';
      document.getElementById('updatedAt').textContent =
        `ประกาศ ${announcedAt} · ${source}`;
    } else {
      document.getElementById('updatedAt').textContent =
        'แหล่งข้อมูลตอบไม่ได้ — แสดงค่าตัวอย่าง';
    }
  } catch (e) {
    document.getElementById('updatedAt').textContent =
      'เชื่อมต่อไม่ได้ — แสดงค่าตัวอย่าง';
  }
  updateHero(prices);
  renderEffectiveBanner(effectiveText);
  renderRows('oilCard', ORDER_MAIN, prices);
  renderPremiumBanner(prices);
  renderRows('oilPremiumCard', ORDER_PREMIUM, prices);
  drawOil('7d');
}

function drawOil(r) {
  let vals, labs;
  if (heroSeries && heroSeries.length >= 2) {
    vals = r === '7d'
      ? [heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[0], heroSeries[1], heroSeries[1]]
      : Array.from({ length: 30 }, (_, i) => (i < 28 ? heroSeries[0] : heroSeries[1]));
    labs = r === '7d'
      ? ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.']
      : Array.from({ length: 30 }, (_, i) => String(i + 1));
  } else {
    vals = r === '7d'
      ? [36.44, 36.44, 36.44, 35.94, 35.94, 35.94, 35.94]
      : Array.from({ length: 30 }, (_, i) => 36.44 - (i > 20 ? 0.5 : 0));
    labs = r === '7d'
      ? ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.']
      : Array.from({ length: 30 }, (_, i) => String(i + 1));
  }
  drawLineChart('oilChart', vals, labs, '#2D3FE0');
}

window.addEventListener('load', () => {
  fetchOil();
  setInterval(fetchOil, 30 * 60 * 1000);
});
window.addEventListener('resize', () => drawOil('7d'));
</script>
